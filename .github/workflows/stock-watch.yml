name: Stock Watch

on:
  workflow_dispatch:
    inputs:
      force_test_notification:
        description: "Send test notification even without stock changes"
        required: false
        default: "false"

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run stock watcher
        run: npm run watch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          ENABLE_EMAIL_FALLBACK: ${{ secrets.ENABLE_EMAIL_FALLBACK }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          FORCE_TEST_NOTIFICATION: ${{ github.event.inputs.force_test_notification || 'false' }}
